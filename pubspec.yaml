name: glycotrack_bf
description: "GlycoTrack BF — Application de suivi de glycémie pour le Burkina Faso"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Polices
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0

  # Base de données locale
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Réseau
  http: ^1.2.0
  connectivity_plus: ^6.0.0

  # Sécurité
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

  # Utilitaires
  intl: ^0.19.0
  provider: ^6.1.0
  uuid: ^4.3.3
  flutter_local_notifications: ^17.2.3
  pdf: ^3.11.1
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true